openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: B-View Expense Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: expenses
    description: Expense management
  - name: summaries
    description: Reporting and summaries
  - name: export
    description: Data export
  - name: audit
    description: Audit log
  - name: config
    description: Configuration (categories, departments)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a new user (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List and filter expenses
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: vendor
          in: query
          schema:
            type: string
        - name: paymentMethod
          in: query
          schema:
            type: string
        - name: minAmount
          in: query
          schema:
            type: number
        - name: maxAmount
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated expense list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedExpenses"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create a new expense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get a single expense
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Soft-delete an expense
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /summaries:
    get:
      operationId: getSummaries
      tags: [summaries]
      summary: Get expense summaries and analytics
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly, yearly]
            default: monthly
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"

  /export/pdf:
    get:
      operationId: exportPdf
      tags: [export]
      summary: Export expenses as PDF
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

  /export/excel:
    get:
      operationId: exportExcel
      tags: [export]
      summary: Export expenses as Excel
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Excel file download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit log entries
      security:
        - bearerAuth: []
      parameters:
        - name: expenseId
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAuditLogs"

  /config/categories:
    get:
      operationId: listCategories
      tags: [config]
      summary: List expense categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [config]
      summary: Create a new category (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /config/departments:
    get:
      operationId: listDepartments
      tags: [config]
      summary: List departments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [config]
      summary: Create a new department (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [Admin, FinanceOfficer, Auditor]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - createdAt

    CreateUserBody:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [Admin, FinanceOfficer, Auditor]
      required:
        - email
        - name
        - password
        - role

    Expense:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        amount:
          type: number
        currency:
          type: string
        vendor:
          type: string
        category:
          type: string
        department:
          type: string
        description:
          type: string
        paymentMethod:
          type: string
          enum: [Cash, BankTransfer, POS, CreditCard, Check]
        personResponsible:
          type: string
        documentUrl:
          type: string
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdById:
          type: integer
        createdByName:
          type: string
          nullable: true
      required:
        - id
        - date
        - amount
        - currency
        - vendor
        - category
        - department
        - description
        - paymentMethod
        - personResponsible
        - createdAt
        - updatedAt
        - createdById

    CreateExpenseBody:
      type: object
      properties:
        date:
          type: string
        amount:
          type: number
        currency:
          type: string
          default: NGN
        vendor:
          type: string
        category:
          type: string
        department:
          type: string
        description:
          type: string
        paymentMethod:
          type: string
          enum: [Cash, BankTransfer, POS, CreditCard, Check]
        personResponsible:
          type: string
        documentUrl:
          type: string
          nullable: true
      required:
        - date
        - amount
        - vendor
        - category
        - department
        - description
        - paymentMethod
        - personResponsible

    UpdateExpenseBody:
      type: object
      properties:
        date:
          type: string
        amount:
          type: number
        currency:
          type: string
        vendor:
          type: string
        category:
          type: string
        department:
          type: string
        description:
          type: string
        paymentMethod:
          type: string
          enum: [Cash, BankTransfer, POS, CreditCard, Check]
        personResponsible:
          type: string
        documentUrl:
          type: string
          nullable: true

    PaginatedExpenses:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages

    SummaryResponse:
      type: object
      properties:
        totalAmount:
          type: number
        totalCount:
          type: integer
        currency:
          type: string
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/GroupedAmount"
        byDepartment:
          type: array
          items:
            $ref: "#/components/schemas/GroupedAmount"
        byPaymentMethod:
          type: array
          items:
            $ref: "#/components/schemas/GroupedAmount"
        byPeriod:
          type: array
          items:
            $ref: "#/components/schemas/PeriodAmount"
        recentExpenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
      required:
        - totalAmount
        - totalCount
        - currency
        - byCategory
        - byDepartment
        - byPaymentMethod
        - byPeriod
        - recentExpenses

    GroupedAmount:
      type: object
      properties:
        label:
          type: string
        amount:
          type: number
        count:
          type: integer
        percentage:
          type: number
      required:
        - label
        - amount
        - count
        - percentage

    PeriodAmount:
      type: object
      properties:
        period:
          type: string
        amount:
          type: number
        count:
          type: integer
      required:
        - period
        - amount
        - count

    ExportResponse:
      type: object
      properties:
        downloadUrl:
          type: string
        filename:
          type: string
        expiresAt:
          type: string
          format: date-time
      required:
        - downloadUrl
        - filename
        - expiresAt

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        expenseId:
          type: integer
          nullable: true
        action:
          type: string
          enum: [Create, Update, Delete, Export, Login, Logout]
        details:
          type: string
          nullable: true
        userId:
          type: integer
        userName:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - action
        - userId
        - timestamp

    PaginatedAuditLogs:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
      required:
        - id
        - name

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
      required:
        - name

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - id
        - name

    CreateDepartmentBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name
